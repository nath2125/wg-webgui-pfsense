<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — {{ app_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <form class="card login-card" method="post" action="/login">
    <h1>{{ app_name }}</h1>
    <p class="muted">Sign in to manage WireGuard peers.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <label>Username
      <input name="username" autocomplete="username" autofocus required>
    </label>
    <label>Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    {% if show_2fa %}
    <label>Authentication code
      <input name="totp_code" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9]*" placeholder="6-digit code" maxlength="6">
    </label>
    {% endif %}
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
